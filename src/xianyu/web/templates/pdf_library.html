<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>PDF库</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<aside>
<h1><a href="/">🐟 咸鱼 OS</a></h1>
<a href="/new">＋ 新建记录</a>
<a href="/project">📌 项目中心</a>
<a href="/search">🔍 全局搜索</a>
<a href="/upload-pdf">📄 上传PDF</a>
<a href="/pdf-library">📚 PDF库</a>
<a href="/help">❓ 使用说明</a>
{% for key, item in modules.items() %}
<a href="/module/{{ key }}">{{ item[1] }}</a>
{% endfor %}
</aside>

<main>
<h2>📚 PDF库</h2>

<section>
{% if items %}
  {% for item in items %}
  <div class="file-card">
    <h3>{{ item.name }}</h3>
    <p>{{ item.path }}</p>
  </div>
  {% endfor %}
{% else %}
  <p>暂无 PDF。请先上传文献 PDF。</p>
{% endif %}
</section>
</main>
</body>
</html>

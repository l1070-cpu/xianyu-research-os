<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>文献用途池</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<aside>
<h1><a href="/">🐟 咸鱼 OS</a></h1>
<a href="/literature-v2">📚 文献中心V2</a>
<a href="/literature-pool">🗂️ 文献用途池</a>
<a href="/search">🔍 全局搜索</a>
{% for key, item in modules.items() %}
<a href="/module/{{ key }}">{{ item[1] }}</a>
{% endfor %}
</aside>

<main>
<h2>🗂️ 文献用途池</h2>

{% for pool, items in pools.items() %}
<section>
<h3>{{ pool }}</h3>
{% if items %}
  {% for item in items %}
  <div class="file-card">
    <h3><a href="/file?path={{ item.path }}">{{ item.name }}</a></h3>
    <pre>{{ item.content }}</pre>
  </div>
  {% endfor %}
{% else %}
  <p>暂无文献。</p>
{% endif %}
</section>
{% endfor %}
</main>
</body>
</html>

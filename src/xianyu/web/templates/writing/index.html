<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>论文写作中心</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<aside>
<h1><a href="/">🐟 咸鱼 OS</a></h1>
<a href="/new">＋ 新建记录</a>
<a href="/project">📌 项目中心</a>
<a href="/search">🔍 全局搜索</a>
<a href="/upload-pdf">📄 上传PDF</a>
<a href="/pdf-library">📚 PDF库</a>
<a href="/help">❓ 使用说明</a>
{% for key, item in modules.items() %}
<a href="/module/{{ key }}">{{ item[1] }}</a>
{% endfor %}
</aside>

<main>
<h2>✍️ 论文写作中心</h2>

<section>
<h3>＋ 新建写作模板</h3>
<form method="post" action="/writing/new">
  <p>
    <label>写作部分</label><br>
    <select name="section_type">
      <option value="introduction">Introduction</option>
      <option value="methods">Materials and Methods</option>
      <option value="results">Results</option>
      <option value="discussion">Discussion</option>
      <option value="abstract">Abstract</option>
      <option value="cover">Cover Letter</option>
      <option value="response">Response Letter</option>
    </select>
  </p>

  <p>
    <label>标题 / 主题</label><br>
    <input name="title" placeholder="例如：Discussion_金毛狗脊_IS机制" required>
  </p>

  <button type="submit">生成写作模板</button>
</form>
<form method="post" action="/backup" style="margin:10px 0;">
  <button type="submit">一键备份</button>
</form>
</section>

<section>
<h3>最近论文写作记录</h3>
{% if items %}
  {% for item in items %}
  <div class="file-card">
    <h3><a href="/file?path={{ item.path }}">{{ item.name }}</a></h3>
    <p>{{ item.path }}</p>
    <pre>{{ item.content }}</pre>
  </div>
  {% endfor %}
{% else %}
  <p>暂无论文写作记录。</p>
{% endif %}
</section>
</main>
</body>
</html>

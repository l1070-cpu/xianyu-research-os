<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>搜索</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<aside>
<h1><a href="/">🐟 咸鱼 OS</a></h1>
<a href="/new">＋ 新建记录</a>
<a href="/project">📌 项目中心</a>
<a href="/search">🔍 全局搜索</a>
<a href="/upload-pdf">📄 上传PDF</a>
<a href="/pdf-library">📚 PDF库</a>
<a href="/literature-v2">📚 文献中心V2</a>
<a href="/literature-pool">🗂️ 文献用途池</a>
<a href="/literature-keywords">🧬 机制关键词池</a>
<a href="/help">❓ 使用说明</a>
<form method="post" action="/snapshot" style="margin:10px 0;">
  <button type="submit">保存Git快照</button>
</form>
<form method="post" action="/backup" style="margin:10px 0;">
  <button type="submit">一键备份</button>
</form>
{% for key, item in modules.items() %}
<a href="/module/{{ key }}">{{ item[1] }}</a>
{% endfor %}
</aside>

<main>
<h2>🔍 全局搜索</h2>

<section>
<form method="get" action="/search">
  <input name="q" value="{{ q }}" placeholder="搜索 HP20 / CCK8 / AKT1 / Discussion">
  <button type="submit">搜索</button>
</form>
</section>

<section>
{% if results %}
  {% for item in results %}
  <div class="file-card">
    <h3><a href="/file?path={{ item.path }}">{{ item.name }}</a></h3>
    <p>{{ item.path }}</p>
    <pre>{{ item.content }}</pre>
  </div>
  {% endfor %}
{% else %}
  <p>暂无结果。</p>
{% endif %}
</section>
</main>
</body>
</html>

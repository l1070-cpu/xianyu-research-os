<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>搜索</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<aside>
<h1><a href="/">🐟 咸鱼 OS</a></h1>
<a href="/new">＋ 新建记录</a>
<a href="/project">📌 项目中心</a>
<a href="/search">🔍 全局搜索</a>
{% for key, item in modules.items() %}
<a href="/module/{{ key }}">{{ item[1] }}</a>
{% endfor %}
</aside>

<main>
<h2>🔍 全局搜索</h2>

<section>
<form method="get" action="/search">
  <input name="q" value="{{ q }}" placeholder="搜索 HP20 / CCK8 / AKT1 / Discussion">
  <button type="submit">搜索</button>
</form>
</section>

<section>
{% if results %}
  {% for item in results %}
  <div class="file-card">
    <h3><a href="/file?path={{ item.path }}">{{ item.name }}</a></h3>
    <p>{{ item.path }}</p>
    <pre>{{ item.content }}</pre>
  </div>
  {% endfor %}
{% else %}
  <p>暂无结果。</p>
{% endif %}
</section>
</main>
</body>
</html>

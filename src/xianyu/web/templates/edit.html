<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>编辑记录</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<aside>
<h1><a href="/">🐟 咸鱼 OS</a></h1>
<a href="/new">＋ 新建记录</a>
<a href="/project">📌 项目中心</a>
<a href="/search">🔍 全局搜索</a>
<a href="/help">❓ 使用说明</a>
<form method="post" action="/snapshot" style="margin:10px 0;">
  <button type="submit">保存Git快照</button>
</form>
<form method="post" action="/backup" style="margin:10px 0;">
  <button type="submit">一键备份</button>
</form>
{% for key, item in modules.items() %}
<a href="/module/{{ key }}">{{ item[1] }}</a>
{% endfor %}
</aside>

<main>
<h2>编辑：{{ path }}</h2>

<section>
<form method="post" action="/edit">
  <input type="hidden" name="path" value="{{ path }}">
  <textarea name="content" style="width:100%; height:70vh; font-size:15px; line-height:1.7;">{{ content }}</textarea>
  <br><br>
  <button type="submit">保存</button>
  <a href="/file?path={{ path }}">取消</a>
</form>
</section>
</main>
</body>
</html>

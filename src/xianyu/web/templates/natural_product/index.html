<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>天然产物中心</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<aside>
<h1><a href="/">🐟 咸鱼 OS</a></h1>
<a href="/new">＋ 新建记录</a>
<a href="/project">📌 项目中心</a>
<a href="/search">🔍 全局搜索</a>
{% for key, item in modules.items() %}
<a href="/module/{{ key }}">{{ item[1] }}</a>
{% endfor %}
</aside>

<main>
<h2>🌿 天然产物 / UPLC-QTOF-MS 中心</h2>

<section>
<h3>＋ 新建成分分析任务</h3>
<form method="post" action="/natural-product/new">
  <p>
    <label>任务名称</label><br>
    <input name="title" placeholder="例如：金毛狗脊_UPLC_QTOF_MS成分分析" required>
  </p>
  <button type="submit">生成成分分析记录</button>
</form>
</section>

<section>
<h3>最近成分分析记录</h3>
{% if items %}
  {% for item in items %}
  <div class="file-card">
    <h3><a href="/file?path={{ item.path }}">{{ item.name }}</a></h3>
    <p>{{ item.path }}</p>
    <pre>{{ item.content }}</pre>
  </div>
  {% endfor %}
{% else %}
  <p>暂无天然产物分析记录。</p>
{% endif %}
</section>
</main>
</body>
</html>

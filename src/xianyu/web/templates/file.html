<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{ path }}</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<aside>
<h1><a href="/">🐟 咸鱼 OS</a></h1>
<a href="/new">＋ 新建记录</a><a href="/project">📌 项目中心</a>
<a href="/search">🔍 全局搜索</a>
<a href="/upload-pdf">📄 上传PDF</a>
<a href="/help">❓ 使用说明</a>
<form method="post" action="/snapshot" style="margin:10px 0;">
  <button type="submit">保存Git快照</button>
</form>
<form method="post" action="/backup" style="margin:10px 0;">
  <button type="submit">一键备份</button>
</form>
{% for key, item in modules.items() %}
<a href="/module/{{ key }}">{{ item[1] }}</a>
{% endfor %}
</aside>

<main>
<h2>{{ path }}</h2>
<p>
<a href="/edit?path={{ path }}">✏️ 编辑此记录</a>
</p>
<form method="post" action="/delete" onsubmit="return confirm('确定删除这条记录吗？');">
  <input type="hidden" name="path" value="{{ path }}">
  <button type="submit">删除此记录</button>
</form>
<section>
<pre>{{ content }}</pre>
</section>
</main>
</body>
</html>

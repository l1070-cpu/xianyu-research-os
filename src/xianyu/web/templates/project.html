<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>项目中心</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<aside>
<h1><a href="/">🐟 咸鱼 OS</a></h1>
<a href="/new">＋ 新建记录</a>
<a href="/project">📌 项目中心</a>
<a href="/search">🔍 全局搜索</a>
<form method="post" action="/snapshot" style="margin:10px 0;">
  <button type="submit">保存Git快照</button>
</form>
{% for key, item in modules.items() %}
<a href="/module/{{ key }}">{{ item[1] }}</a>
{% endfor %}

<main>

<section>

<div class="progress"><div style="width: {{ progress }}%"></div></div>

</section>

<section>
<h3>项目总览</h3>
<pre>{{ overview }}</pre>
</section>

<section>
<h3>快速入口</h3>
<div class="quick-grid">
<a href="/literature">📚 文献中心</a>

</body>
</html>
